apiversion: apps/v1
kind: Deployment

metadata:
  name: full-stack-1

spec:
  replicas: 2

  selector:
    matchLables:
      app: full-stack-1
  
  template:
    metadata:
      Labels:
        app: full-stack-1

    spec:
      containers:
      - name: full-stack-1
        image: dhinesh2001/full-stack-1:v1
        ports:
        - containerPort: 5000